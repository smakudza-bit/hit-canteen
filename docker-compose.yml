services:
  db:
    image: postgres:16-alpine
    container_name: hit_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hit_canteen
      POSTGRES_USER: hit_user
      POSTGRES_PASSWORD: hit_pass_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hit_user -d hit_canteen"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: hit_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://hit_user:hit_pass_change_me@db:5432/hit_canteen
      DEBUG: "false"
      ALLOWED_HOSTS: "*"
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: hit_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
