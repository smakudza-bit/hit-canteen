<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Meal Ticket | HIT Canteen</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260507b" />
</head>
<body data-page="student-qr" class="hit-ui">
  <div class="hit-shell">
    <header class="hit-topbar">
      <div class="hit-topbar__brand">
        <div class="hit-logo-mark hit-logo-lockup">
          <span class="hit-logo-lockup__mark">HIT</span>
          <span class="hit-logo-lockup__text">Harare Institute<br>of Technology</span>
        </div>
        <div class="hit-topbar__meta">
          <h1>My Meal Ticket</h1>
          <p>Show your QR code at collection. After staff scans it, wait for your order number to be called.</p>
        </div>
      </div>
      <a class="hit-chip" href="/student/">Back</a>
    </header>

    <main class="hit-main">
      <section class="hit-card hit-status-panel">
        <div id="student-qr-box" class="hit-qr-box">
          <div class="hit-qr-placeholder"></div>
        </div>
        <div>
          <h2 id="student-qr-name" style="margin:0;">Student</h2>
          <p id="student-qr-meta" class="hit-muted">Ticket information will appear here.</p>
        </div>
        <button id="student-qr-refresh" class="hit-btn-secondary" type="button">Refresh Ticket</button>
        <p id="student-qr-status" class="status-msg"></p>
      </section>
    </main>
  </div>

  <script src="/static/app.js?v=20260507b"></script>
</body>
</html>
