<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My QR | HIT Canteen</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260506b" />
</head>
<body data-page="student-qr" class="hit-ui">
  <div class="hit-shell">
    <header class="hit-topbar">
      <div class="hit-topbar__brand">
        <div class="hit-logo-mark hit-logo-lockup">
          <span class="hit-logo-lockup__mark">HIT</span>
          <span class="hit-logo-lockup__text">Harare Institute<br>of Technology</span>
        </div>
        <div class="hit-topbar__meta">
          <h1>My Payment QR</h1>
          <p>Present this code to staff for payment verification.</p>
        </div>
      </div>
      <a class="hit-chip" href="/student/">Back</a>
    </header>

    <main class="hit-main">
      <section class="hit-card hit-status-panel">
        <div id="student-qr-box" class="hit-qr-box">
          <div class="hit-qr-placeholder"></div>
        </div>
        <div>
          <h2 id="student-qr-name" style="margin:0;">Student</h2>
          <p id="student-qr-meta" class="hit-muted">Student ID</p>
        </div>
        <button id="student-qr-refresh" class="hit-btn-secondary" type="button">Refresh Code</button>
        <p id="student-qr-status" class="status-msg"></p>
      </section>
    </main>
  </div>

  <script src="/static/app.js?v=20260414a"></script>
  <script>
    (function () {
      const token = localStorage.getItem('hit_token') || '';
      const qrBox = document.getElementById('student-qr-box');
      const qrName = document.getElementById('student-qr-name');
      const qrMeta = document.getElementById('student-qr-meta');
      const qrStatus = document.getElementById('student-qr-status');
      const refreshBtn = document.getElementById('student-qr-refresh');

      const setStatus = (message, ok = true) => {
        if (!qrStatus) return;
        qrStatus.textContent = message;
        qrStatus.className = ok ? 'status-msg success' : 'status-msg error';
      };

      const authHeaders = () => token ? { Authorization: `Bearer ${token}` } : {};

      const loadQr = async () => {
        if (!token) {
          window.location.replace('/student-login/');
          return;
        }
        try {
          setStatus('Loading your QR ticket...');
          const [profileRes, ticketRes] = await Promise.all([
            fetch('/api/v1/auth/me', { headers: authHeaders() }),
            fetch('/api/v1/tickets/mine', { headers: authHeaders() }),
          ]);

          if (!profileRes.ok || !ticketRes.ok) {
            throw new Error('Unable to load your QR ticket right now.');
          }

          const profile = await profileRes.json();
          const tickets = await ticketRes.json();

          if (qrName) qrName.textContent = profile.full_name || 'Student';

          if (!Array.isArray(tickets) || !tickets.length) {
            qrBox.innerHTML = '<div class="hit-empty-state">No active QR ticket yet. Complete an order and your QR will appear here.</div>';
            if (qrMeta) qrMeta.textContent = profile.student_id || 'No active ticket';
            setStatus('No QR ticket found yet.', false);
            return;
          }

          const ticket = tickets[0];
          qrBox.innerHTML = `<div class="ticket-card__qr hit-qr-live">${ticket.qr_svg || ticket.ticket_qr_svg || '<div class="hit-empty-state">QR unavailable for this ticket.</div>'}</div>`;
          if (qrMeta) {
            const expiresText = ticket.expires_at ? `Valid until ${new Date(ticket.expires_at).toLocaleString()}` : 'Ticket issued';
            qrMeta.textContent = `Collection No. ${ticket.order_ref || ticket.ticket_id} | ${expiresText}`;
          }
          setStatus('QR ticket loaded successfully.');
        } catch (error) {
          qrBox.innerHTML = '<div class="hit-empty-state">Unable to display the QR ticket right now.</div>';
          setStatus(error.message || 'Unable to load your QR ticket.', false);
        }
      };

      refreshBtn?.addEventListener('click', loadQr);
      window.addEventListener('load', loadQr);
    }());
  </script>
</body>
</html>
