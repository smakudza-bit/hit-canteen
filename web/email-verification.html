<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Verify Email | HIT Canteen</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260506b" />
</head>
<body class="hit-ui">
  <main class="hit-auth">
    <section class="hit-auth__card">
      <div class="hit-auth__header">
        <div class="hit-logo-mark hit-logo-lockup"><span class="hit-logo-lockup__mark">HIT</span><span class="hit-logo-lockup__text">Harare Institute<br>of Technology</span></div>
        <div class="hit-page-head">
          <h1>Verify Your Email</h1>
          <p>We sent a secure code or verification link to your HIT email. Confirm ownership before using the platform.</p>
        </div>
      </div>
      <div class="hit-alert hit-alert--info">Your account will remain inactive until verification is complete.</div>
      <form class="hit-form-stack">
        <div class="hit-field">
          <label class="hit-label" for="verification-code">Verification Code</label>
          <input class="hit-input" id="verification-code" placeholder="Enter 6-digit code" />
        </div>
        <button class="hit-btn" type="button">Verify Account</button>
      </form>
      <div class="hit-link-row">
        <a href="#">Resend Code</a>
        <a href="/student-login/">Back to Login</a>
      </div>
    </section>
  </main>
</body>
</html>
