<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scan to Pay | HIT Canteen</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260507c" />
</head>
<body data-page="student-pay-scanner" class="hit-ui hit-scanner-shell">
  <main class="hit-main hit-stack hit-mobile-scanner">
    <div class="hit-page-head hit-page-head--scanner">
      <h1>Scan to Pay</h1>
      <p>Point your camera at the meal QR code</p>
    </div>

    <section class="pay-scanner-card">
      <div class="pay-scanner-stage">
        <div id="student-pay-reader" class="hit-scanner-frame pay-scanner-frame"></div>
        <div class="pay-scanner-grid" aria-hidden="true"></div>
        <div class="hit-scanner-line pay-scanner-line" aria-hidden="true"></div>
      </div>

      <div class="pay-scanner-meta">
        <p class="pay-scanner-balance-label">Wallet Balance</p>
        <p id="student-pay-wallet-balance" class="pay-scanner-balance">$0.00</p>
      </div>

      <div class="pay-scanner-actions">
        <button id="student-pay-start-btn" class="hit-btn-gold hit-btn-lg" type="button">Start Camera</button>
        <button id="student-pay-stop-btn" class="hit-btn-secondary hit-btn-lg" type="button">Cancel</button>
      </div>
      <p id="student-pay-status" class="status-msg"></p>
    </section>

    <div id="student-pay-overlay" class="scanner-overlay" hidden>
      <div class="scanner-overlay__backdrop"></div>
      <div class="scanner-overlay__sheet scanner-overlay__sheet--success">
        <div class="scanner-overlay__pulse"></div>
        <div class="scanner-overlay__icon scanner-overlay__icon--success" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path fill="currentColor" d="M9.55 18.2 4.8 13.45l1.4-1.4 3.35 3.35 8.25-8.25 1.4 1.4Z"/></svg>
        </div>
        <h2>Payment Successful</h2>
        <p>Meal redeemed successfully</p>
        <p id="student-pay-overlay-meta" class="scanner-overlay__meta">Wallet ready for your next meal.</p>
        <a class="hit-btn-gold hit-btn-lg" href="/student/">Back to Dashboard</a>
      </div>
    </div>
  </main>
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="/static/app.js?v=20260507c"></script>
</body>
</html>
