<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HIT Accommodation and Canteen Portal</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260506b" />
</head>
<body data-page="student-login" class="hit-ui hit-split-login-page">
  <main class="hit-split-login">
    <section class="hit-split-login__visual">
      <div class="hit-split-login__overlay"></div>
      <div class="hit-split-login__copy">
        <h1>Welcome to HIT Canteen</h1>
        <p>Sign in to access your account</p>
      </div>
    </section>

    <section class="hit-split-login__form-side">
      <div class="hit-split-login__card">
        <div class="hit-split-login__logo">
          <div class="hit-logo-mark hit-logo-lockup"><span class="hit-logo-lockup__mark">HIT</span><span class="hit-logo-lockup__text">Harare Institute<br>of Technology</span></div>
        </div>

        <div class="hit-split-login__heading">
          <h2>Sign In</h2>
          <p>Please sign in with your HIT account</p>
        </div>

        <form id="student-login-form" class="hit-split-login__form">
          <input class="hit-input hit-split-login__input" id="login-email" type="email" placeholder="name@hit.ac.zw" required />
          <div class="hit-password-wrap hit-split-login__password-wrap">
            <input class="hit-input hit-split-login__input" id="login-password" type="password" placeholder="Enter password" required />
            <button class="hit-password-toggle" type="button" data-toggle-password="login-password">Show</button>
          </div>
          <button class="hit-split-login__submit" type="submit">Sign In with HIT Account</button>
        </form>

        <p id="login-status" class="status-msg hit-split-login__status"></p>

        <div class="hit-split-login__meta">
          <a href="/student-forgot-password/">Forgot Password?</a>
          <a href="/register/">Create Account</a>
        </div>

        <div class="hit-split-login__demo">
          <span>Quick access:</span>
          <button id="student-demo-fill-btn" class="hit-split-login__demo-btn" type="button">Student Demo</button>
          <button id="staff-demo-fill-btn" class="hit-split-login__demo-btn" type="button">Staff Demo</button>
          <button id="admin-demo-fill-btn" class="hit-split-login__demo-btn" type="button">Admin Demo</button>
        </div>
      </div>
    </section>
  </main>
  <script src="/static/app.js?v=20260414a"></script>
</body>
</html>
